name: artifacts_upload

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install nodejs
        uses: actions/setup-node@v6
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: npm run lint
      - name: Run Tests
        run: npm run test

  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      script-file: ${{ steps.publish.outputs.script-file }} # accessing steps context like we did with the github context before to ouput it.

    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: Install nodejs
        uses: actions/setup-node@v6
      - name: Install dependencies
        run: npm ci
      - name: Build Website
        run: npm run build
      - name: Publish JS filename
        id: publish
        run: find dist/assets/*.js -type f -execdir echo 'script-file{} >> $GITHUB_OUTPUT' ';'
      - name: Upload artifacts # Artifact Upload
        uses: actions/upload-artifact@v7
        with:
          name: dist-files # giving my artifact a name to use later
          path: dist
          # path: |
          #   dist
          #   package.json

  deploy:
    needs: build # NEEDED for specifying which job we will dowload which artifact from
    runs-on: ubuntu-latest

    steps:
      - name: Get build artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist-files # specifying the artifact name from previous jobs
      - name: Outuput contents
        run: ls
      - name: Output filename
        run: echo "${{ needs.build.outputs.script-file }}"
      - name: Deploy
        run: echo "Deploying...."